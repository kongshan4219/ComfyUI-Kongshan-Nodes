name: Publish ComfyUI Node

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "pyproject.toml"
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check registry token
        shell: bash
        env:
          REGISTRY_ACCESS_TOKEN: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
        run: |
          if [ -z "$REGISTRY_ACCESS_TOKEN" ]; then
            echo "::error::Missing GitHub Actions secret REGISTRY_ACCESS_TOKEN. Create it from Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Publish to Comfy Registry
        uses: Comfy-Org/publish-node-action@main
        with:
          personal_access_token: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
          skip_checkout: "true"
